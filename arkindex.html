<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK サーバーコントロールパネル</title>
    <style>
        /* 🎨 全体のデザイン設定 */
        body {
            /* お好みのARKの壁紙URLや画像パスに変えられます */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.steamusercontent.com/ugc/1653349811966104941/8621516B9F81A4A21A4D26B241C7245F351929B9/?imw=5000&imh=5000&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=false');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }

        /* 📦 中央のカードボード */
        .container {
            background: rgba(15, 25, 35, 0.85);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* 🔘 ボタングループ */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 🚀 起動ボタン（緑系） */
        .btn-start {
            background-color: #00ff88;
            color: #05100a;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }
        .btn-start:hover {
            background-color: #33ffa2;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }

        /* 🛑 停止ボタン（赤系） */
        .btn-stop {
            background-color: #ff4444;
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }
        .btn-stop:hover {
            background-color: #ff6666;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 68, 68, 0.5);
        }

        /* 押せない状態（処理中） */
        .btn:disabled {
            background-color: #555 !important;
            color: #888 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 💬 結果表示エリア */
        #status-message {
            margin-top: 25px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            background: rgba(255, 255, 255, 0.05);
        }
        .info { border-left: 4px solid #00ffcc; color: #00ffcc; }
        .error { border-left: 4px solid #ff4444; color: #ff4444; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ARK Server Control</h1>
        <div class="subtitle">遊び終わったら必ず【停止】を押してね！</div>
        
        <div class="btn-group">
            <button class="btn btn-start" id="start-btn" onclick="controlServer('start')">サーバー起動</button>
            <button class="btn btn-stop" id="stop-btn" onclick="controlServer('stop')">サーバー停止</button>
        </div>

        <div id="status-message"></div>
    </div>

    <script>
        // 🛠️ ここにGCPで発行されたURLを貼り付けます！
        const URLS = {
            start: 'https://start-ark-server-962204122249.us-central1.run.app',
            stop: 'https://stop-ark-server-962204122249.us-central1.run.app'
        };

        async function controlServer(action) {
            const startBtn = document.getElementById('start-btn');
            const stopBtn = document.getElementById('stop-btn');
            const msgArea = document.getElementById('status-message');

            // ボタンを一時的に無効化
            startBtn.disabled = true;
            stopBtn.disabled = true;
            
            msgArea.style.display = 'block';
            msgArea.className = 'info';
            msgArea.innerText = action === 'start' ? '🚀 起動リクエストを送信中...' : '🛑 停止リクエストを送信中...';

            try {
                // バックグラウンドでGCPのURLを叩く
                const response = await fetch(URLS[action], { method: 'POST' });
                const text = await response.text();

                if (response.ok) {
                    msgArea.className = 'info';
                    msgArea.innerText = text;
                } else {
                    msgArea.className = 'error';
                    msgArea.innerText = `❌ エラーが発生しました: ${text}`;
                }
            } catch (error) {
                msgArea.className = 'error';
                msgArea.innerText = '❌ 通信エラーが発生しました。時間を置いて再度お試しください。';
            } finally {
                // 3秒後にボタンを再度有効化
                setTimeout(() => {
                    startBtn.disabled = false;
                    stopBtn.disabled = false;
                }, 3000);
            }
        }
    </script>
</body>
</html>
